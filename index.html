<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Drawing Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #videoElement {
            display: none;
        }
        
        #canvas {
            max-width: 100%;
            max-height: 100%;
            background: #000;
            /* No mirroring for back camera */
        }
        
        #status {
            position: absolute;
            top: 80px;
            left: 20px;
            color: #00ffff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        #fps {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff00ff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        #resetBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 18px;
            background: #ff00ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none;
        }
        
        #resetBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 5;
        }
        
        #backImage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 160%;
            max-height: 160%;
            z-index: 15;
            display: none;
        }
        
        #chatbox {
            position: fixed;
            right: 0;
            top: 0;
            width: 350px;
            height: 100vh;
            background: rgba(26, 26, 26, 0.95);
            border-left: 2px solid #00ffff;
            display: none;
            flex-direction: column;
            z-index: 20;
        }
        
        #chatHeader {
            padding: 20px;
            background: #2a2a2a;
            border-bottom: 2px solid #00ffff;
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
        }
        
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: white;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.5;
        }
        
        .system-message {
            background: rgba(0, 255, 255, 0.1);
            border-left: 3px solid #00ffff;
        }
        
        .ai-message {
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid #ff00ff;
        }
        
        #apiKeyInput {
            margin: 10px 20px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #00ffff;
            color: white;
            border-radius: 5px;
            font-size: 14px;
        }
        
        #apiKeyInput::placeholder {
            color: #666;
        }
        
        #analyzeBtn {
            margin: 0 20px 20px 20px;
            padding: 12px;
            background: #ff00ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        #analyzeBtn:hover {
            background: #cc00cc;
        }
        
        #analyzeBtn:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loading">Loading Hand Tracking Model...</div>
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="fps">0</div>
        <div id="status">Hold still for 1s to start</div>
        <button id="resetBtn">Reset (R)</button>
        <img id="backImage" src="back.png" alt="Back">
    </div>
    
    <div id="chatbox">
        <div id="chatHeader">AI Analysis</div>
        <div id="chatMessages">
            <div class="message system-message">
                Enter your OpenAI API key below and click "Analyze Drawing" to get an AI assessment of the patient's drawing.
            </div>
        </div>
        <input type="password" id="apiKeyInput" placeholder="Enter OpenAI API Key">
        <button id="analyzeBtn" disabled>Analyze Drawing</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        // Updated: 1 second stop timer - v2
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const fpsDiv = document.getElementById('fps');
        const resetBtn = document.getElementById('resetBtn');
        const loadingDiv = document.getElementById('loading');
        const backImage = document.getElementById('backImage');

        // State variables
        let trailPoints = [];
        let frozenTrail = [];
        let recentPositions = [];
        let stillSince = null;
        let drawing = false;
        let done = false;
        let doneTime = null;
        let lastDrawPos = null;
        let frozenFrame = null;
        let lastTime = performance.now();
        let fps = 0;

        const MAX_RECENT = 10;
        const STILL_THRESHOLD = 15;
        const MAX_TRAIL = 50;

        // Hand connections for drawing skeleton
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [5,9],[9,10],[10,11],[11,12],
            [9,13],[13,14],[14,15],[15,16],
            [13,17],[17,18],[18,19],[19,20],[0,17]
        ];

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Setup camera - FORCE BACK CAMERA
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
            },
            width: 1280,
            height: 720,
            facingMode: { exact: 'environment' } // Force back camera
        });

        camera.start().then(() => {
            loadingDiv.style.display = 'none';
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            console.log('Camera started:', canvas.width, 'x', canvas.height);
        }).catch((error) => {
            loadingDiv.textContent = 'Error: ' + error.message + '\nPlease allow camera access';
            console.error('Camera error:', error);
        });

        function onResults(results) {
            // Set canvas size if not set
            if (canvas.width === 0 || canvas.height === 0) {
                canvas.width = results.image.width;
                canvas.height = results.image.height;
            }

            // Calculate FPS
            const now = performance.now();
            fps = Math.round(1000 / (now - lastTime));
            lastTime = now;
            fpsDiv.textContent = fps;

            // If frozen (after 3 seconds), show frozen frame and return
            if (done && doneTime && (Date.now() - doneTime) >= 3000 && frozenFrame) {
                ctx.putImageData(frozenFrame, 0, 0);
                return;
            }

            // Always draw video frame first
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Draw the trail during drawing mode
            if (drawing && trailPoints.length >= 2) {
                ctx.beginPath();
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
                for (let i = 1; i < trailPoints.length; i++) {
                    ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
                }
                ctx.stroke();
            }

            // ALWAYS draw frozen trail when done, even without hands
            if (done && frozenTrail.length >= 2) {
                ctx.beginPath();
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(frozenTrail[0].x, frozenTrail[0].y);
                for (let i = 1; i < frozenTrail.length; i++) {
                    ctx.lineTo(frozenTrail[i].x, frozenTrail[i].y);
                }
                ctx.stroke();
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw hand landmarks only if not done
                    if (!done) {
                        drawLandmarks(landmarks);
                        drawConnections(landmarks);
                    }

                    // Get index finger tip (landmark 8)
                    const indexTip = landmarks[8];
                    const cx = indexTip.x * canvas.width; // No mirroring for back camera
                    const cy = indexTip.y * canvas.height;

                    recentPositions.push({x: cx, y: cy});
                    if (recentPositions.length > MAX_RECENT) {
                        recentPositions.shift();
                    }

                    if (recentPositions.length === MAX_RECENT) {
                        const avgX = recentPositions.reduce((sum, p) => sum + p.x, 0) / MAX_RECENT;
                        const avgY = recentPositions.reduce((sum, p) => sum + p.y, 0) / MAX_RECENT;
                        const maxSpread = Math.max(...recentPositions.map(p => 
                            Math.sqrt((p.x - avgX) ** 2 + (p.y - avgY) ** 2)
                        ));
                        const isStill = maxSpread < STILL_THRESHOLD;

                        if (!done) {
                            if (isStill) {
                                if (stillSince === null) {
                                    stillSince = Date.now();
                                }
                                const elapsed = (Date.now() - stillSince) / 1000;
                                
                                // Check if it's time to start or stop
                                if (!drawing && elapsed >= 1) {
                                    // Start drawing after 1 second
                                    drawing = true;
                                    stillSince = null;
                                } else if (drawing && elapsed >= 1) {
                                    // Stop drawing after 1 second
                                    console.log('STOPPING! Trail points:', trailPoints.length);
                                    done = true;
                                    doneTime = Date.now();
                                    drawing = false;
                                    frozenTrail = [...trailPoints];
                                    console.log('Frozen trail saved:', frozenTrail.length);
                                    stillSince = null;
                                    recentPositions = [];
                                    resetBtn.style.display = 'block';
                                }
                            } else {
                                stillSince = null;
                                if (drawing) {
                                    if (!lastDrawPos || Math.sqrt((cx - lastDrawPos.x) ** 2 + (cy - lastDrawPos.y) ** 2) > 30) {
                                        trailPoints.push({x: cx, y: cy});
                                        lastDrawPos = {x: cx, y: cy};
                                        if (trailPoints.length > MAX_TRAIL) {
                                            trailPoints.shift();
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // Draw live finger tracking line during drawing
                    if (drawing && trailPoints.length >= 1) {
                        ctx.beginPath();
                        ctx.strokeStyle = '#0000ff';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.moveTo(trailPoints[trailPoints.length - 1].x, trailPoints[trailPoints.length - 1].y);
                        ctx.lineTo(cx, cy);
                        ctx.stroke();
                    }
                }

                // Update status
                if (done) {
                    statusDiv.textContent = "DONE - Press Reset";
                } else if (drawing) {
                    if (stillSince) {
                        const remaining = Math.max(0, 1 - (Date.now() - stillSince) / 1000);
                        statusDiv.textContent = `STOP IN: ${remaining.toFixed(1)}s`;
                    } else {
                        statusDiv.textContent = "DRAWING";
                    }
                } else {
                    if (stillSince) {
                        const remaining = Math.max(0, 1 - (Date.now() - stillSince) / 1000);
                        statusDiv.textContent = `START IN: ${remaining.toFixed(1)}s`;
                    } else {
                        statusDiv.textContent = "HOLD STILL 1s";
                    }
                }
            }

            // Capture frozen frame after 3 seconds and show back.png
            if (done && doneTime && (Date.now() - doneTime) >= 3000 && !frozenFrame) {
                frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                backImage.style.display = 'block';
                console.log('Frozen frame captured and back.png displayed');
                // Show chatbox after frozen frame is captured
                showChatbox();
            }
        }

        function drawLandmarks(landmarks) {
            for (let i = 0; i < landmarks.length; i++) {
                const x = landmarks[i].x * canvas.width;
                const y = landmarks[i].y * canvas.height;
                
                ctx.beginPath();
                ctx.arc(x, y, i === 0 ? 10 : 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff00ff';
                ctx.fill();
            }
        }

        function drawConnections(landmarks) {
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            
            for (const [start, end] of HAND_CONNECTIONS) {
                const x1 = landmarks[start].x * canvas.width;
                const y1 = landmarks[start].y * canvas.height;
                const x2 = landmarks[end].x * canvas.width;
                const y2 = landmarks[end].y * canvas.height;
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function reset() {
            trailPoints = [];
            frozenTrail = [];
            recentPositions = [];
            stillSince = null;
            drawing = false;
            done = false;
            doneTime = null;
            lastDrawPos = null;
            frozenFrame = null;
            resetBtn.style.display = 'none';
            backImage.style.display = 'none';
        }

        resetBtn.addEventListener('click', reset);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                reset();
            }
        });

        // ============ CHATBOX FUNCTIONALITY ============
        const chatbox = document.getElementById('chatbox');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const chatMessages = document.getElementById('chatMessages');

        // Enable analyze button when API key is entered and drawing is done
        apiKeyInput.addEventListener('input', () => {
            analyzeBtn.disabled = !apiKeyInput.value || !done;
        });

        // Show chatbox when drawing is complete
        function showChatbox() {
            chatbox.style.display = 'flex';
            analyzeBtn.disabled = !apiKeyInput.value;
        }

        // Add message to chat
        function addMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Capture canvas with annotations as base64 image
        function captureAnnotatedImage() {
            // Create a temporary canvas to combine everything
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            // Draw the frozen frame
            if (frozenFrame) {
                tempCtx.putImageData(frozenFrame, 0, 0);
            }

            // Draw the back.png overlay if visible
            if (backImage.style.display === 'block' && backImage.complete) {
                const imgAspect = backImage.naturalWidth / backImage.naturalHeight;
                const canvasAspect = canvas.width / canvas.height;
                
                let drawWidth, drawHeight, drawX, drawY;
                
                if (imgAspect > canvasAspect) {
                    drawWidth = canvas.width * 1.6;
                    drawHeight = drawWidth / imgAspect;
                } else {
                    drawHeight = canvas.height * 1.6;
                    drawWidth = drawHeight * imgAspect;
                }
                
                drawX = (canvas.width - drawWidth) / 2;
                drawY = (canvas.height - drawHeight) / 2;
                
                tempCtx.drawImage(backImage, drawX, drawY, drawWidth, drawHeight);
            }

            // Draw the frozen trail in dark blue
            if (frozenTrail.length >= 2) {
                tempCtx.beginPath();
                tempCtx.strokeStyle = '#0000ff'; // Dark blue
                tempCtx.lineWidth = 3;
                tempCtx.lineCap = 'round';
                tempCtx.lineJoin = 'round';
                tempCtx.moveTo(frozenTrail[0].x, frozenTrail[0].y);
                for (let i = 1; i < frozenTrail.length; i++) {
                    tempCtx.lineTo(frozenTrail[i].x, frozenTrail[i].y);
                }
                tempCtx.stroke();
            }

            // Convert to base64
            return tempCanvas.toDataURL('image/jpeg', 0.8);
        }

        // Analyze drawing with OpenAI
        async function analyzeDrawing() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                addMessage('Please enter an API key', 'system-message');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';
            addMessage('Analyzing drawing...', 'system-message');

            try {
                // Capture the image
                const imageBase64 = captureAnnotatedImage();
                
                // Call OpenAI Vision API
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'text',
                                        text: 'You are a medical assessment AI analyzing a patient\'s drawing test. In this image:\n\n- LIGHT BLUE lines represent the AI-generated template/reference (the expected pattern)\n- DARK BLUE lines represent the patient\'s actual drawing\n\nPlease provide a clinical assessment report that includes:\n1. How well the patient\'s drawing matches the template\n2. Any notable deviations, tremors, or irregularities\n3. Observations about motor control, coordination, and accuracy\n4. Clinical significance of any findings\n5. Overall assessment and recommendations\n\nBe professional, specific, and constructive in your analysis.'
                                    },
                                    {
                                        type: 'image_url',
                                        image_url: {
                                            url: imageBase64
                                        }
                                    }
                                ]
                            }
                        ],
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                const analysis = data.choices[0].message.content;

                addMessage(analysis, 'ai-message');
                analyzeBtn.textContent = 'Analyze Drawing';
                analyzeBtn.disabled = false;

            } catch (error) {
                console.error('Analysis error:', error);
                addMessage(`Error: ${error.message}`, 'system-message');
                analyzeBtn.textContent = 'Analyze Drawing';
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', analyzeDrawing);
    </script>
</body>
</html>
