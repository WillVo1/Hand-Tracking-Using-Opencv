<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpineySaver - ML Spine Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #videoElement {
            display: none;
        }
        
        #canvas {
            max-width: 100%;
            max-height: 100%;
            background: #000;
        }
        
        #status {
            position: absolute;
            top: 80px;
            left: 20px;
            color: #00ffff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        #fps {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff00ff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        #resetBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 18px;
            background: #ff00ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none;
        }
        
        #resetBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 5;
        }
        
        #mlOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 10px;
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            display: none;
            text-align: center;
        }
        
        #chatbox {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(26, 26, 26, 0.95);
            border-left: 2px solid #00ffff;
            display: none;
            flex-direction: column;
            z-index: 20;
        }
        
        #chatHeader {
            padding: 20px;
            background: #2a2a2a;
            border-bottom: 2px solid #00ffff;
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
        }
        
        #apiKeySection {
            padding: 15px 20px;
            background: #1f1f1f;
            border-bottom: 1px solid #333;
        }
        
        #apiKeySection label {
            color: #00ffff;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }
        
        #apiKeyInput {
            width: 100%;
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid #00ffff;
            color: white;
            border-radius: 5px;
            font-size: 12px;
        }
        
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            color: white;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .system-message {
            background: rgba(0, 255, 255, 0.1);
            border-left: 3px solid #00ffff;
        }
        
        .ai-message {
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid #ff00ff;
        }
        
        .ml-message {
            background: rgba(0, 255, 0, 0.1);
            border-left: 3px solid #00ff00;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        
        .metric-label {
            color: #00ffff;
            font-weight: bold;
        }
        
        .metric-value {
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loading">Loading Hand Tracking Model...</div>
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="fps">0</div>
        <div id="status">Hold still for 1s to start</div>
        <button id="resetBtn">Reset (R)</button>
        <div id="mlOverlay">
            🤖 ML Model Analyzing...<br>
            Predicting Spine Line
        </div>
    </div>
    
    <div id="chatbox">
        <div id="chatHeader">ML Analysis Report</div>
        <div id="apiKeySection">
            <label for="apiKeyInput">API Key (OpenAI/Anthropic)</label>
            <input type="password" id="apiKeyInput" placeholder="Enter your API key for AI analysis">
        </div>
        <div id="chatMessages">
            <div class="message system-message">
                Complete the drawing to see the ML analysis report here.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const fpsDiv = document.getElementById('fps');
        const resetBtn = document.getElementById('resetBtn');
        const loadingDiv = document.getElementById('loading');
        const mlOverlay = document.getElementById('mlOverlay');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // State variables
        let trailPoints = [];
        let frozenTrail = [];
        let predictedLine = [];
        let recentPositions = [];
        let stillSince = null;
        let drawing = false;
        let done = false;
        let doneTime = null;
        let lastDrawPos = null;
        let frozenFrame = null;
        let lastTime = performance.now();
        let fps = 0;

        const MAX_RECENT = 10;
        const STILL_THRESHOLD = 15;
        const MAX_TRAIL = 50;

        // Hand connections for drawing skeleton
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [5,9],[9,10],[10,11],[11,12],
            [9,13],[13,14],[14,15],[15,16],
            [13,17],[17,18],[18,19],[19,20],[0,17]
        ];

        // ML Model prediction simulation
        function predictSpineLine(points) {
            if (points.length < 4) return [];
            
            // Simulate ML model prediction
            const xs = points.map(p => p.x);
            const ys = points.map(p => p.y);
            
            // Fit a polynomial curve (simulating ML prediction)
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            const avgX = xs.reduce((a, b) => a + b, 0) / xs.length;
            
            // Generate predicted line with slight curvature
            const predicted = [];
            for (let y = minY; y <= maxY; y += 5) {
                const t = (y - minY) / (maxY - minY);
                const x = avgX + Math.sin(t * Math.PI) * 20; // Slight curvature
                predicted.push({x: Math.round(x), y: Math.round(y)});
            }
            
            console.log('ML Model predicted', predicted.length, 'points');
            return predicted;
        }

        // Generate AI analysis prompt
        function generateAnalysisPrompt(trailPoints, predictedLine) {
            const apiKey = apiKeyInput.value.trim();
            
            if (!apiKey) {
                return {
                    hasKey: false,
                    message: "Please enter an API key to generate AI analysis"
                };
            }
            
            // Calculate metrics
            const xs = trailPoints.map(p => p.x);
            const avgX = xs.reduce((a, b) => a + b, 0) / xs.length;
            const deviations = xs.map(x => Math.abs(x - avgX));
            const maxDeviation = Math.max(...deviations);
            const avgDeviation = deviations.reduce((a, b) => a + b, 0) / deviations.length;
            const estimatedAngle = Math.round(avgDeviation / 10 * 15);
            
            const prompt = `Analyze this spinal drawing with the following metrics:
- Trail points: ${trailPoints.length}
- Max deviation: ${maxDeviation.toFixed(2)}px
- Avg deviation: ${avgDeviation.toFixed(2)}px
- Estimated curvature angle: ~${estimatedAngle}°
- API Key: ${apiKey.substring(0, 10)}...

Provide a brief analysis of the spinal curvature.`;
            
            console.log('[AI Prompt Generated]');
            console.log('Angle:', estimatedAngle, '°');
            console.log('Deviation:', avgDeviation.toFixed(2), 'px');
            
            return {
                hasKey: true,
                prompt: prompt,
                metrics: {
                    points: trailPoints.length,
                    maxDeviation: maxDeviation.toFixed(2),
                    avgDeviation: avgDeviation.toFixed(2),
                    angle: estimatedAngle
                }
            };
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Setup camera
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
            },
            width: 1280,
            height: 720,
            facingMode: { ideal: 'environment' }
        });

        camera.start().then(() => {
            loadingDiv.style.display = 'none';
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            console.log('Camera started:', canvas.width, 'x', canvas.height);
        }).catch((error) => {
            loadingDiv.textContent = 'Error: ' + error.message + '\nPlease allow camera access';
            console.error('Camera error:', error);
        });

        function onResults(results) {
            if (canvas.width === 0 || canvas.height === 0) {
                canvas.width = results.image.width;
                canvas.height = results.image.height;
            }

            const now = performance.now();
            fps = Math.round(1000 / (now - lastTime));
            lastTime = now;
            fpsDiv.textContent = fps;

            if (done && doneTime && (Date.now() - doneTime) >= 3000 && frozenFrame) {
                ctx.putImageData(frozenFrame, 0, 0);
                return;
            }

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Draw trail during drawing
            if (drawing && trailPoints.length >= 2) {
                ctx.beginPath();
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
                for (let i = 1; i < trailPoints.length; i++) {
                    ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
                }
                ctx.stroke();
            }

            // Draw frozen trail (drawn line) in RED
            if (done && frozenTrail.length >= 2) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(frozenTrail[0].x, frozenTrail[0].y);
                for (let i = 1; i < frozenTrail.length; i++) {
                    ctx.lineTo(frozenTrail[i].x, frozenTrail[i].y);
                }
                ctx.stroke();
                
                // Draw ML predicted line in GREEN
                if (predictedLine.length >= 2) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.moveTo(predictedLine[0].x, predictedLine[0].y);
                    for (let i = 1; i < predictedLine.length; i++) {
                        ctx.lineTo(predictedLine[i].x, predictedLine[i].y);
                    }
                    ctx.stroke();
                    
                    // Add legend
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(10, 150, 20, 3);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '14px Arial';
                    ctx.fillText('Drawn Line', 35, 155);
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(10, 170, 20, 3);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('ML Prediction', 35, 175);
                }
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    if (!done) {
                        drawLandmarks(landmarks);
                        drawConnections(landmarks);
                    }

                    const indexTip = landmarks[8];
                    const cx = indexTip.x * canvas.width;
                    const cy = indexTip.y * canvas.height;

                    recentPositions.push({x: cx, y: cy});
                    if (recentPositions.length > MAX_RECENT) {
                        recentPositions.shift();
                    }

                    if (recentPositions.length === MAX_RECENT) {
                        const avgX = recentPositions.reduce((sum, p) => sum + p.x, 0) / MAX_RECENT;
                        const avgY = recentPositions.reduce((sum, p) => sum + p.y, 0) / MAX_RECENT;
                        const maxSpread = Math.max(...recentPositions.map(p => 
                            Math.sqrt((p.x - avgX) ** 2 + (p.y - avgY) ** 2)
                        ));
                        const isStill = maxSpread < STILL_THRESHOLD;

                        if (!done) {
                            if (isStill) {
                                if (stillSince === null) {
                                    stillSince = Date.now();
                                }
                                const elapsed = (Date.now() - stillSince) / 1000;
                                
                                if (!drawing && elapsed >= 1) {
                                    drawing = true;
                                    stillSince = null;
                                } else if (drawing && elapsed >= 1) {
                                    console.log('STOPPING! Trail points:', trailPoints.length);
                                    done = true;
                                    doneTime = Date.now();
                                    drawing = false;
                                    frozenTrail = [...trailPoints];
                                    
                                    // Use ML model to predict spine line
                                    mlOverlay.style.display = 'block';
                                    setTimeout(() => {
                                        predictedLine = predictSpineLine(frozenTrail);
                                        mlOverlay.style.display = 'none';
                                        
                                        // Generate AI analysis
                                        const analysis = generateAnalysisPrompt(frozenTrail, predictedLine);
                                        showAnalysisReport(analysis);
                                    }, 1500);
                                    
                                    stillSince = null;
                                    recentPositions = [];
                                    resetBtn.style.display = 'block';
                                }
                            } else {
                                stillSince = null;
                                if (drawing) {
                                    if (!lastDrawPos || Math.sqrt((cx - lastDrawPos.x) ** 2 + (cy - lastDrawPos.y) ** 2) > 30) {
                                        trailPoints.push({x: cx, y: cy});
                                        lastDrawPos = {x: cx, y: cy};
                                        if (trailPoints.length > MAX_TRAIL) {
                                            trailPoints.shift();
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if (drawing && trailPoints.length >= 1) {
                        ctx.beginPath();
                        ctx.strokeStyle = '#0000ff';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.moveTo(trailPoints[trailPoints.length - 1].x, trailPoints[trailPoints.length - 1].y);
                        ctx.lineTo(cx, cy);
                        ctx.stroke();
                    }
                }

                if (done) {
                    statusDiv.textContent = "DONE - ML Analysis Complete";
                } else if (drawing) {
                    if (stillSince) {
                        const remaining = Math.max(0, 1 - (Date.now() - stillSince) / 1000);
                        statusDiv.textContent = `STOP IN: ${remaining.toFixed(1)}s`;
                    } else {
                        statusDiv.textContent = "DRAWING";
                    }
                } else {
                    if (stillSince) {
                        const remaining = Math.max(0, 1 - (Date.now() - stillSince) / 1000);
                        statusDiv.textContent = `START IN: ${remaining.toFixed(1)}s`;
                    } else {
                        statusDiv.textContent = "HOLD STILL 1s";
                    }
                }
            }

            if (done && doneTime && (Date.now() - doneTime) >= 3000 && !frozenFrame) {
                frozenFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                console.log('Frozen frame captured');
            }
        }

        function drawLandmarks(landmarks) {
            for (let i = 0; i < landmarks.length; i++) {
                const x = landmarks[i].x * canvas.width;
                const y = landmarks[i].y * canvas.height;
                
                ctx.beginPath();
                ctx.arc(x, y, i === 0 ? 10 : 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff00ff';
                ctx.fill();
            }
        }

        function drawConnections(landmarks) {
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            
            for (const [start, end] of HAND_CONNECTIONS) {
                const x1 = landmarks[start].x * canvas.width;
                const y1 = landmarks[start].y * canvas.height;
                const x2 = landmarks[end].x * canvas.width;
                const y2 = landmarks[end].y * canvas.height;
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function reset() {
            trailPoints = [];
            frozenTrail = [];
            predictedLine = [];
            recentPositions = [];
            stillSince = null;
            drawing = false;
            done = false;
            doneTime = null;
            lastDrawPos = null;
            frozenFrame = null;
            resetBtn.style.display = 'none';
            mlOverlay.style.display = 'none';
            chatbox.style.display = 'none';
            chatMessages.innerHTML = '<div class="message system-message">Complete the drawing to see the ML analysis report here.</div>';
        }

        resetBtn.addEventListener('click', reset);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                reset();
            }
        });

        // ============ ANALYSIS REPORT FUNCTIONALITY ============
        const chatbox = document.getElementById('chatbox');
        const chatMessages = document.getElementById('chatMessages');

        function showAnalysisReport(analysis) {
            console.log('Showing analysis report');
            chatbox.style.display = 'flex';
            chatMessages.innerHTML = '';
            
            if (!analysis.hasKey) {
                addMessage(analysis.message, 'system-message');
                addMessage('Enter your API key above to generate AI-powered analysis using GPT-4 or Claude.', 'system-message');
            } else {
                // Show metrics
                const metricsHtml = `
                    <div class="metric">
                        <span class="metric-label">Trail Points:</span>
                        <span class="metric-value">${analysis.metrics.points}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Max Deviation:</span>
                        <span class="metric-value">${analysis.metrics.maxDeviation}px</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Avg Deviation:</span>
                        <span class="metric-value">${analysis.metrics.avgDeviation}px</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Estimated Angle:</span>
                        <span class="metric-value">~${analysis.metrics.angle}°</span>
                    </div>
                `;
                
                addMessage('ML Model Analysis Complete', 'ml-message');
                const metricsDiv = document.createElement('div');
                metricsDiv.className = 'message ml-message';
                metricsDiv.innerHTML = metricsHtml;
                chatMessages.appendChild(metricsDiv);
                
                addMessage('AI Prompt Generated:\n\n' + analysis.prompt, 'ai-message');
                addMessage('The AI analysis would be generated here using your API key to call OpenAI GPT-4 or Anthropic Claude for detailed spinal curvature assessment.', 'system-message');
            }
        }

        function addMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
